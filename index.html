       <div class="core-idle rounded p-1 text-[8px] text-center text-white font-bold">
        C4
       </div>
       <div class="core-idle rounded p-1 text-[8px] text-center text-white font-bold">
        C5
       </div>
       <div class="core-idle rounded p-1 text-[8px] text-center text-white font-bold">
        C6
       </div>
       <div class="core-idle rounded p-1 text-[8px] text-center text-white font-bold">
        C7
       </div>
      </div>
      <p class="text-[9px] text-gray-500" id="cpu-info">Active: 0 | 4.77GHz | DDR5-5600</p>
     </div>
     <div data-template-id="history-panel" class="canva-panel p-4 rounded border border-gray-700">
      <h3 data-template-id="history-title" class="canva-text font-bold text-sm mb-2"></h3>
      <div id="history-list" class="space-y-2 max-h-48 overflow-y-auto"></div>
      <p id="history-empty" class="text-xs text-gray-500 text-center py-2">No saved calculations</p>
      <p id="limit-warning" class="text-xs text-red-400 hidden text-center py-1">Limit reached (999)</p>
     </div>
    </aside>
   </div>
  </main>
  <script src="/_sdk/c939c145c3c74230.editing_sdk.js" integrity="sha512-jh2pv/gl9Gzzn5dxfzwQO4wkqtnAQIim+LIUDYfVu2cdqPkQV2MqbjsDUW5IYbrSZFjRlOBrIWzlvWDXQYxOjg=="></script>
  <script src="/_sdk/935a53bc2e11fb8d.data_sdk.js" integrity="sha512-qr2oyPnEys1WebcOABaRh6hG77r5PWpqeWW6JTKbRJqly/INsfBi31CVNlTmHqjgeLpkVmmHZJUdxSx/32tOFQ=="></script>
  <script>
  (async function() {
    let records = [];
    const handler = {
      onDataChanged(data) {
        records = data;
        renderHistory();
      }
    };
    await window.dataSdk.init(handler);

    const tabs = document.querySelectorAll('[data-tab]');
    tabs.forEach(t => t.addEventListener('click', () => {
      tabs.forEach(x => x.classList.remove('tab-active'));
      t.classList.add('tab-active');
      document.querySelectorAll('[id^="panel-"]').forEach(p => p.classList.add('hidden'));
      document.getElementById('panel-' + t.dataset.tab).classList.remove('hidden');
    }));

    function setLED(val) {
      val = Math.max(0, Math.min(255, Math.abs(Math.round(val))));
      const bits = val.toString(2).padStart(8, '0');
      const leds = document.getElementById('led-display').children;
      for (let i = 0; i < 8; i++) {
        leds[i].className = 'w-5 h-5 rounded-full ' + (bits[i] === '1' ? 'led-on' : 'led-off');
      }
      document.getElementById('led-info').textContent = `Binary: ${bits} | Decimal: ${val}`;
      const cores = document.getElementById('core-grid').children;
      let active = 0;
      for (let i = 0; i < 8; i++) {
        if (bits[i] === '1') { cores[i].className = 'core-active rounded p-1 text-[8px] text-center text-black font-bold'; active++; }
        else { cores[i].className = 'core-idle rounded p-1 text-[8px] text-center text-white font-bold'; }
      }
      document.getElementById('cpu-info').textContent = `Active: ${active} | 4.77GHz | DDR5-5600`;
      return bits;
    }

    async function saveCalc(type, input, result, binary) {
      if (records.length >= 999) { document.getElementById('limit-warning').classList.remove('hidden'); return; }
      await window.dataSdk.create({ calc_type: type, input_value: input, result: result, binary_output: binary, created_at: new Date().toISOString() });
    }

    function renderHistory() {
      const list = document.getElementById('history-list');
      const empty = document.getElementById('history-empty');
      if (records.length === 0) { list.innerHTML = ''; empty.classList.remove('hidden'); return; }
      empty.classList.add('hidden');
      const badgeMap = { quadratic:'badge-blue', octal:'badge-green', linear:'badge-orange', percentage:'badge-purple', factorial:'badge-pink' };
      const fragment = document.createDocumentFragment();
      records.slice().reverse().forEach(r => {
        const el = document.createElement('div');
        el.dataset.id = r.__backendId;
        el.className = 'flex items-center justify-between text-[10px] bg-gray-800 rounded px-2 py-1';
        el.innerHTML = `<span class="px-1 rounded ${badgeMap[r.calc_type]||'badge-blue'}">${r.calc_type}</span><span class="truncate mx-1 flex-1">${r.result}</span><button class="text-red-400 hover:text-red-200 del-btn" type="button">×</button>`;
        el.querySelector('.del-btn').onclick = async () => { await window.dataSdk.delete(r); };
        fragment.appendChild(el);
      });
      list.innerHTML = '';
      list.appendChild(fragment);
    }

    // Quadratic
    document.getElementById('quad-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const a=parseFloat(document.getElementById('qa').value), b=parseFloat(document.getElementById('qb').value), c=parseFloat(document.getElementById('qc').value);
      const D=b*b-4*a*c;
      let badge,badgeClass;
      if(D>0){badge='Δ > 0 (Two Real Roots)';badgeClass='badge-green';}
      else if(D===0){badge='Δ = 0 (Double Root)';badgeClass='badge-yellow';}
      else{badge='Δ < 0 (Complex Roots)';badgeClass='badge-red';}
      let html=`<div class="p-2 rounded text-xs ${badgeClass} inline-block font-bold">${badge}</div>`;
      html+=`<div class="step-box pl-3 py-1 text-xs"><strong>Equation:</strong> ${a}x² + (${b})x + (${c}) = 0</div>`;
      html+=`<div class="step-box pl-3 py-1 text-xs"><strong>Step 1:</strong> Δ = b² - 4ac = ${b*b} - ${4*a*c} = ${D}</div>`;
      let x1,x2,resultStr;
      if(D>=0){
        x1=(-b+Math.sqrt(D))/(2*a); x2=(-b-Math.sqrt(D))/(2*a);
        html+=`<div class="step-box pl-3 py-1 text-xs"><strong>Roots:</strong> x₁=${x1.toFixed(4)}, x₂=${x2.toFixed(4)}</div>`;
        html+=`<div class="step-box pl-3 py-1 text-xs"><strong>Verify:</strong> f(x₁) = ${(a*x1*x1+b*x1+c).toFixed(6)} ≈ 0 ✓</div>`;
        resultStr=`x₁=${x1.toFixed(4)}, x₂=${x2.toFixed(4)}`;
      } else {
        const real=(-b/(2*a)).toFixed(4), imag=(Math.sqrt(-D)/(2*a)).toFixed(4);
        html+=`<div class="step-box pl-3 py-1 text-xs"><strong>Complex:</strong> x = ${real} ± ${imag}i</div>`;
        resultStr=`${real} ± ${imag}i`; x1=Math.abs(Math.round(parseFloat(real)));
      }
      document.getElementById('quad-result').innerHTML=html;
      const bin=setLED(Math.abs(Math.round(x1||0)));
      await saveCalc('quadratic',`${a}x²+${b}x+${c}=0`,resultStr,bin);
    });

    // Octal
    document.getElementById('octal-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      let num=parseInt(document.getElementById('oct-input').value); const orig=num;
      let remainders=[],html=`<div class="step-box pl-3 py-1 text-xs"><strong>Converting ${num} to Octal:</strong></div>`;
      let step=1;
      if(num===0){remainders.push(0);}
      else{let n=Math.abs(num);while(n>0){const q=Math.floor(n/8),r=n%8;html+=`<div class="step-box pl-3 py-1 text-xs">Step ${step}: ${n} ÷ 8 = ${q} R ${r}</div>`;remainders.push(r);n=q;step++;}}
      const octal=remainders.slice().reverse().join('');
      html+=`<div class="step-box pl-3 py-1 text-xs font-bold">Result: ${orig}₁₀ = ${octal}₈</div>`;
      document.getElementById('octal-result').innerHTML=html;
      const bin=setLED(Math.abs(orig)%256);
      await saveCalc('octal',`${orig}₁₀`,`${octal}₈`,bin);
    });

    // Linear
    document.getElementById('linear-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const a=parseFloat(document.getElementById('la').value),b=parseFloat(document.getElementById('lb').value),c=parseFloat(document.getElementById('lc').value);
      const x=(c-b)/a;
      let html=`<div class="step-box pl-3 py-1 text-xs"><strong>${a}x + ${b} = ${c}</strong></div>`;
      html+=`<div class="step-box pl-3 py-1 text-xs">Step 1: ${a}x = ${c-b}</div>`;
      html+=`<div class="step-box pl-3 py-1 text-xs">Step 2: x = ${x.toFixed(4)}</div>`;
      html+=`<div class="step-box pl-3 py-1 text-xs"><strong>Verify:</strong> ${(a*x+b).toFixed(4)} ≈ ${c} ✓</div>`;
      document.getElementById('linear-result').innerHTML=html;
      const bin=setLED(Math.abs(Math.round(x))%256);
      await saveCalc('linear',`${a}x+${b}=${c}`,`x=${x.toFixed(4)}`,bin);
    });

    // Percentage
    document.getElementById('pct-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const num=parseFloat(document.getElementById('pct-num').value),pct=parseFloat(document.getElementById('pct-pct').value);
      const result=num*pct/100;
      let html=`<div class="step-box pl-3 py-1 text-xs"><strong>${pct}% of ${num}:</strong></div>`;
      html+=`<div class="step-box pl-3 py-1 text-xs">${num} × ${pct} ÷ 100 = ${result}</div>`;
      document.getElementById('pct-result').innerHTML=html;
      const bin=setLED(Math.round(result)%256);
      await saveCalc('percentage',`${pct}% of ${num}`,`${result}`,bin);
    });

    // Factorial
    document.getElementById('fact-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const n=parseInt(document.getElementById('fact-n').value);
      let result=1,seq=[];
      for(let i=1;i<=n;i++){result*=i;seq.push(i);}
      let html=`<div class="step-box pl-3 py-1 text-xs"><strong>${n}!</strong> = ${seq.join(' × ')} = ${result}</div>`;
      document.getElementById('fact-result').innerHTML=html;
      const bin=setLED(result%256);
      await saveCalc('factorial',`${n}!`,`${result}`,bin);
    });

    // Generate circuit LEDs and resistors
    const ledG=document.getElementById('circuit-leds');
    for(let i=0;i<8;i++){const x=i*55;ledG.innerHTML+=`<g transform="translate(${x},0)"><rect x="5" y="0" width="35" height="40" fill="#0a2" stroke="#0f0" stroke-width="0.5" rx="3"/><circle cx="22" cy="15" r="8" fill="url(#led-grad)" stroke="#4ade80" stroke-width="1"/><text x="22" y="34" fill="#aaa" font-size="4" text-anchor="middle">LED${i+1}</text></g>`;}
    const resG=document.getElementById('circuit-resistors');
    for(let i=0;i<8;i++){const x=i*55;resG.innerHTML+=`<g transform="translate(${x},0)"><rect x="5" y="5" width="35" height="12" fill="#d2691e" stroke="#8b4513" stroke-width="0.8" rx="3"/><rect x="10" y="5" width="4" height="12" fill="#f00"/><rect x="16" y="5" width="4" height="12" fill="#f00"/><rect x="22" y="5" width="4" height="12" fill="#8b4513"/><rect x="28" y="5" width="4" height="12" fill="#d4a017"/><text x="22" y="28" fill="#ccc" font-size="5" text-anchor="middle">R${i+1}:220Ω</text></g>`;}

    lucide.createIcons();
  })();
  </script>
 </body>
</html>
